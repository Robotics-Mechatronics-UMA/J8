ARGJ801:
  global_parameters:
    secured_cmd_vel_topic_name: "secured_change"

  argj801_ctrl_platform_node:
      kinematic_parameters:
    # Parámetros del modelo cinemático (ver `argj801_kinematic_model.*`).
    # - efective_radius: radio efectivo (m). Ojo: el nombre tiene typo histórico.
    # - xICR: distancia al ICR (m) usada para convertir w a diferencial entre ruedas.
    # - *_to_percent: escalados del modelo a unidades esperadas por el actuador/backend.
        efective_radius : 0.283 
        xICR : 0.95
        throttle_to_percent : 3.9276
        steer_to_percent : 17.2790
      arduino_params:
      # Parámetros del backend Arduino (serie).
      # port: dispositivo tipo /dev/ttyUSB0.
      # watchdog_active: si true, el nodo suele parar si deja de llegar cmd_vel.
          port:  "/dev/ttyUSB0"
          watchdog_active: true
      lcm_params:
      # Fichero YAML con URLs/cabeceras/canales LCM (dentro de src/argj801_lcm/config/).
          lcm_config_file:  "argj801_lcm_config_platform.yaml"
      throttle_topic_name: "cmd_throttle_msg"
    # operation_mode:
    # - 0 Arduino
    # - 1 LCM
    # - 2 Gazebo
      operation_mode: 1
      self_test_active: false
